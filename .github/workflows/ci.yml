name: AI Test Generation & Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: playwright_template/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies (Playwright template + app)
        run: npm ci --prefix playwright_template && npm ci --prefix application_code

      - name: Install Playwright browsers
        run: npm exec --prefix playwright_template -- playwright install --with-deps chromium

      - name: Generate tests (Gemini)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_SKIP_CACHE: '1'
        run: node scripts/generate-tests.js

      - name: Run Playwright (API + E2E)
        env:
          CI: true
        run: npm exec --prefix playwright_template -- playwright test -c scripts/playwright.config.ts

      # Assessment: "Produce test logs or artifacts" — upload CI outputs; do not commit these folders to git.
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
