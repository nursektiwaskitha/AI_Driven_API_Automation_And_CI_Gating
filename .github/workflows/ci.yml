name: AI Test Generation & Quality Gate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            playwright_template/package-lock.json
            application_code/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: application_code/go.sum

      - name: Verify LLM secret
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::Repository secret LLM_API_KEY is not set (or unavailable on fork PRs). Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Install dependencies (Playwright template + app)
        run: npm ci --prefix playwright_template && npm ci --prefix application_code

      - name: Install Playwright browsers
        run: npm exec --prefix playwright_template -- playwright install --with-deps chromium

      - name: Generate tests (Gemini)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_SKIP_CACHE: '1'
        run: node scripts/generate-tests.js

      - name: Run Playwright (API + E2E)
        env:
          CI: true
          NODE_OPTIONS: --max-old-space-size=6144
        run: npm exec --prefix playwright_template -- playwright test -c scripts/playwright.config.ts

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
